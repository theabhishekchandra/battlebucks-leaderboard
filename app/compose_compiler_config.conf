// Classes the Compose compiler should treat as stable.
//
// These live in :leaderboard, a pure Kotlin module that is not compiled by the Compose compiler.
// Without this file the compiler cannot see inside them, assumes they may change unpredictably,
// and gives up on skipping any composable that reads one — including every LazyColumn row.
//
// They genuinely are stable: data classes of String/Long/Int, no var, no mutable collections.
com.abhishek.battlebucks.leaderboard.LeaderboardEntry
com.abhishek.battlebucks.leaderboard.LeaderboardState
com.abhishek.battlebucks.leaderboard.RankMovement
com.abhishek.battlebucks.leaderboard.ScoreUpdate
